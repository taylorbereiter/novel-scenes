<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Hamlet — The Royal Court · Act 1, Scene 2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
<canvas id="c"></canvas>

<div id="js-error" style="position:fixed;top:0;left:0;right:0;z-index:999;background:#b9503f;color:#fff;padding:8px 14px;font:12px/1.4 Menlo,monospace;display:none;white-space:pre-wrap;max-height:40vh;overflow:auto"></div>
<script>
  window.addEventListener('error', (e) => {
    const el = document.getElementById('js-error');
    el.style.display = 'block';
    el.textContent = 'JS ERROR: ' + (e.message || '') + '\nat ' + (e.filename || '') + ':' + (e.lineno || '') + ':' + (e.colno || '') + '\n' + (e.error && e.error.stack ? e.error.stack : '');
  });
  window.addEventListener('unhandledrejection', (e) => {
    const el = document.getElementById('js-error');
    el.style.display = 'block';
    el.textContent = 'PROMISE REJECTION: ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '\n' + (e.reason && e.reason.stack ? e.reason.stack : '');
  });
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import {
  createScene,
  loadAssets,
  makeExaminable,
  enableExamination,
  startRenderLoop
} from 'https://cdn.jsdelivr.net/gh/taylorbereiter/novel-scenes@main/framework/scene-loader.js';
import { BeatEngine } from 'https://cdn.jsdelivr.net/gh/taylorbereiter/novel-scenes@main/framework/beat-engine.js';
import { BookUI }    from 'https://cdn.jsdelivr.net/gh/taylorbereiter/novel-scenes@main/framework/book-ui.js';
import { GuideBook, runGuideBookEval, showEvalBanner }
  from 'https://cdn.jsdelivr.net/gh/taylorbereiter/novel-scenes@main/framework/guide-book.js';

BookUI.mount();

/* ============================================================
   RIG — the great hall of Elsinore, morning of the marriage feast
   Warm amber / red / gold. Candlelight and daylight mingled.
   ============================================================ */
const { scene, camera, renderer, composer, sun, hemi } = createScene({
  skyColor: 0x2a1410,
  fogDensity: 0.012,
  cameraPos: [0, 2.6, 10],
  exposure: 1.1
});
camera.lookAt(0, 1.8, -1);

// Warmer hemi — interior candle glow
sun.intensity = 0.7;
sun.color.set(0xffe6b0);
sun.position.set(-4, 15, 8);
hemi.intensity = 0.9;
hemi.color.set(0xffd9a0);
hemi.groundColor.set(0x3a1a0e);

// Candlelight fills near the chandelier and throne
const chandelierLight = new THREE.PointLight(0xffc270, 2.4, 14, 1.6);
chandelierLight.position.set(0, 5, -2);
scene.add(chandelierLight);

const throneLight = new THREE.PointLight(0xffb860, 1.6, 8, 1.8);
throneLight.position.set(0, 3.2, -4.5);
scene.add(throneLight);

// A cooler shaft of daylight coming from the left window — contrast for Hamlet
const windowLight = new THREE.DirectionalLight(0xd4e4ff, 0.7);
windowLight.position.set(-8, 6, 5);
windowLight.target.position.set(5, 1.5, 2);
scene.add(windowLight);
scene.add(windowLight.target);

/* ============================================================
   GROUND — stone floor, polished
   ============================================================ */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshStandardMaterial({ color: 0x3a2a1c, roughness: 0.7 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Red carpet running down the center
const carpet = new THREE.Mesh(
  new THREE.PlaneGeometry(3, 14),
  new THREE.MeshStandardMaterial({ color: 0x6a1e16, roughness: 0.95 })
);
carpet.rotation.x = -Math.PI / 2;
carpet.position.set(0, 0.01, 0);
carpet.receiveShadow = true;
scene.add(carpet);

// Back wall — a simple dark plane so the hall feels enclosed
const backWall = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 10),
  new THREE.MeshStandardMaterial({ color: 0x2a1a12, roughness: 1 })
);
backWall.position.set(0, 5, -8);
scene.add(backWall);

/* ============================================================
   ASSETS
   ============================================================ */
const assets = await loadAssets([
  'castle-throne-chair-01',
  'castle-tapestry-01',
  'castle-candelabra-castle-01',
  'castle-stone-arch-01',
  'castle-castle-window-01',
  'castle-portrait-frame-01',
  'castle-pewter-goblet-01',
  'castle-flag-pole-01',
  'castle-suit-of-armor-01',
  'characters-king-01',
  'characters-queen-01',
  'characters-seated-man-01',
  'character-human-01',
  'characters-woman-standing-01',
  'lighting-torch-wall-01',
  'lighting-wall-sconce-01',
  'handmaid-cloth-on-hook-01'
]);

// --- Throne & court focal point (center-rear) ---
const throne = assets['castle-throne-chair-01'];
throne.position.set(0, 0.4, -6);  // on a small raised platform
scene.add(throne);

// Small platform under the throne
const platform = new THREE.Mesh(
  new THREE.BoxGeometry(4, 0.4, 3),
  new THREE.MeshStandardMaterial({ color: 0x3a241a, roughness: 0.9 })
);
platform.position.set(0, 0.2, -6);
platform.receiveShadow = true;
platform.castShadow = true;
scene.add(platform);

// Tapestry / banner behind the throne
const tapestry = assets['castle-tapestry-01'];
tapestry.position.set(0, 1.2, -7.5);
scene.add(tapestry);

// --- Chandelier ---
const chandelier = assets['castle-candelabra-castle-01'];
chandelier.position.set(0, 6, -2);
scene.add(chandelier);

// --- Wall flanking: arch to the left, window to the right ---
const arch = assets['castle-stone-arch-01'];
arch.position.set(-9, 0, 2);
arch.rotation.y = Math.PI / 2;
scene.add(arch);

const window1 = assets['castle-castle-window-01'];
window1.position.set(-9, 2.5, -2);
window1.rotation.y = Math.PI / 2;
scene.add(window1);

// Old Hamlet's portrait — on the right wall, flanked by a torch
const portrait = assets['castle-portrait-frame-01'];
portrait.position.set(8, 2.8, 0);
portrait.rotation.y = -Math.PI / 2;
scene.add(portrait);

// Suit of armor — standing guard on the right side, representing the old king's presence
const armor = assets['castle-suit-of-armor-01'];
armor.position.set(7.8, 0, 3);
armor.rotation.y = -Math.PI / 2.5;
scene.add(armor);

// Flag pole in the back corner
const flag = assets['castle-flag-pole-01'];
flag.position.set(-6, 0, -7);
scene.add(flag);

// --- Wall lighting ---
const sconceL = assets['lighting-torch-wall-01'];
sconceL.position.set(-5, 0, -6.5);
scene.add(sconceL);

const sconceR = assets['lighting-torch-wall-01'].clone(true);
sconceR.position.set(5, 0, -6.5);
scene.add(sconceR);

const wallLampL = assets['lighting-wall-sconce-01'];
wallLampL.position.set(-8.5, 0, 4);
scene.add(wallLampL);

// --- Court figures ---
// Claudius — standing just in front of the throne, addressing the hall
const claudius = assets['characters-king-01'];
claudius.position.set(0, 0.4, -4.5);
claudius.rotation.y = 0;
scene.add(claudius);

// Gertrude — seated at his right (our left from camera)
const gertrude = assets['characters-queen-01'];
gertrude.position.set(-1.3, 0.4, -5.5);
gertrude.rotation.y = 0.3;
scene.add(gertrude);

// Laertes — standing to the left of the carpet, addressing the king
const laertes = assets['characters-seated-man-01'];
laertes.position.set(-3, 0, -1);
laertes.rotation.y = 0.6;
scene.add(laertes);

// Hamlet — alone, to the right, slightly apart from the court
// (Use the generic human figure — the isolation speaks louder than costume.)
const hamlet = assets['character-human-01'];
hamlet.position.set(4, 0, 1.5);
hamlet.rotation.y = -0.5;
scene.add(hamlet);

// Darken Hamlet's materials to signal his "inky cloak"
hamlet.traverse((obj) => {
  if (obj.isMesh && obj.material) {
    obj.material = obj.material.clone();
    if (obj.material.color) obj.material.color.multiplyScalar(0.3);
  }
});

// Horatio — off-stage during beats 1-4. Will be placed near the arch for beat 5.
const horatio = assets['character-human-01'].clone(true);
horatio.position.set(-8, 0, 3);
horatio.rotation.y = Math.PI / 2;
horatio.visible = false;
scene.add(horatio);

// Goblet — on the edge of the throne platform (wedding toast motif)
const goblet = assets['castle-pewter-goblet-01'];
goblet.position.set(1.3, 0.6, -5);
scene.add(goblet);

// Cloth on hook — hanging near Hamlet as his "inky cloak"
const cloak = assets['handmaid-cloth-on-hook-01'];
cloak.position.set(5.5, 0, 2.5);
cloak.rotation.y = -0.8;
scene.add(cloak);

/* ============================================================
   EXAMINABLES
   ============================================================ */
makeExaminable(throne, 'throne', () => {
  BookUI.showCard({
    title: "The King's Address",
    body: '"Though yet of Hamlet our dear brother\'s death / The memory be green… Yet so far hath discretion fought with nature / That we with wisest sorrow think on him, / Together with remembrance of ourselves." — Claudius',
    note: 'Watch what Claudius does in one sentence: <em>balances</em> his brother\'s death against "remembrance of ourselves." Grief and self-promotion in the same breath. The throne is already his; the eulogy is administrative.'
  });
});

makeExaminable(goblet, 'goblet', () => {
  BookUI.showCard({
    title: "The Marriage Feast",
    body: '"…With mirth in funeral and with dirge in marriage, / In equal scale weighing delight and dole— / Taken to wife." — Claudius',
    note: 'A wedding feast set on the table where the funeral plates still sat. Hamlet will later tell Horatio: "the funeral baked meats / Did coldly furnish forth the marriage tables." Claudius, here, is proud of the efficiency.'
  });
});

makeExaminable(portrait, 'portrait', () => {
  BookUI.showCard({
    title: "Old Hamlet",
    body: '"So excellent a king; that was, to this, / Hyperion to a satyr…" — Hamlet<br><br>"…Within a month— / Let me not think on\'t—Frailty, thy name is woman!—"',
    note: 'In Hamlet\'s soliloquy, the father is a <em>god</em> (Hyperion) and the uncle a goat-legged lecher. He cannot think of the marriage without collapsing into fragments — em-dashes and exclamations. The portrait is what he sees every time he looks at Claudius.'
  });
});

makeExaminable(cloak, 'cloak', () => {
  BookUI.showCard({
    title: "The Inky Cloak",
    body: '"\'Tis not alone my inky cloak, good mother, / Nor customary suits of solemn black, / Nor windy suspiration of forced breath, / … But I have that within which passes show— / These but the trappings and the suits of woe." — Hamlet',
    note: 'Gertrude asks why grief <em>seems</em> so particular in him. Hamlet\'s answer is the play\'s fault line. <em>Seems</em>, madam? He will not grant the word. What others perform, he insists he <em>has</em>.'
  });
});

enableExamination(camera);

/* ============================================================
   GUIDE BOOK — the floating 3D book that leads students
   ============================================================ */
const guideBook = new GuideBook(scene);
// Register static collidables the book must not pass through
guideBook.addCollidable(backWall);
guideBook.addCollidable(tapestry);
guideBook.addCollidable(arch);
guideBook.addCollidable(window1);
guideBook.addCollidable(portrait);
guideBook.addCollidable(armor);

/* ============================================================
   BEATS
   ============================================================ */
const BEATS = [
  {
    label: 'Beat I · The Court in Session',
    title: '"Our sometime sister, now our queen."',
    text: 'Claudius, crowned and married barely two months after his brother\'s burial, addresses the court. <span class="hl">He explains himself before anyone has asked.</span>',
    gloss: 'Examine the <em>throne</em> and the <em>goblet</em>. Notice how much administrative grief one sentence can carry.',
    cite: 'Hamlet · Act 1, Scene 2',
    cameraPos: [0, 2.8, 8],
    cameraLookAt: [0, 1.8, -4]
  },
  {
    label: 'Beat II · Laertes Granted Leave',
    title: 'France is easy to get to.',
    text: '"Your leave and favour to return to France…" — Laertes<br><br>Claudius grants it at once. <span class="hl">Laertes is permitted to leave.</span> Remember that.',
    gloss: 'The favor Claudius gives Laertes in one line he will <em>not</em> give Hamlet in the next. The contrast is the point.',
    cite: 'Hamlet · Act 1, Scene 2',
    cameraPos: [-3, 2.4, 5],
    cameraLookAt: [-3, 1.7, -1]
  },
  {
    label: 'Beat III · "\'Tis sweet and commendable…"',
    title: 'Claudius rebukes Hamlet\'s mourning.',
    text: '"But to persever / In obstinate condolement is a course / Of impious stubbornness; \'tis unmanly grief…" — Claudius<br><br>The king tells the prince his grief is <span class="hl">unmanly</span>. The queen asks him to stay at Elsinore. He consents.',
    gloss: 'Examine the <em>portrait</em> of Old Hamlet. Claudius calls the son\'s grief a fault. Hamlet says nothing — yet.',
    cite: 'Hamlet · Act 1, Scene 2',
    cameraPos: [2, 2.6, 6],
    cameraLookAt: [0, 2, -4]
  },
  {
    label: 'Beat IV · "O, that this too too solid flesh…"',
    title: 'Alone.',
    text: '"O, that this too too solid flesh would melt, / Thaw and resolve itself into a dew! / Or that the Everlasting had not fix\'d / His canon \'gainst self-slaughter!" — Hamlet',
    gloss: 'Examine the <em>cloak</em>. The court has cleared. This is the first time we hear Hamlet alone — and the first thing he wants is not to be.',
    cite: 'Hamlet · Act 1, Scene 2',
    cameraPos: [5.5, 2.2, 5],
    cameraLookAt: [4, 1.6, 1],
    onEnter: () => {
      // Court figures fade in a sense — dim the interior lighting slightly to isolate Hamlet
      chandelierLight.intensity = 1.0;
      throneLight.intensity = 0.6;
    }
  },
  {
    label: 'Beat V · Horatio Arrives',
    title: '"My lord, I think I saw him yesternight."',
    text: 'Horatio, Marcellus, and Bernardo enter through the arch. <span class="hl">"The king your father."</span> Hamlet hears it. The play has arrived.',
    gloss: 'Everything that follows begins here. Horatio came to tell him — just as Horatio said he would, on the battlements.',
    cite: 'Hamlet · Act 1, Scene 2',
    cameraPos: [2, 3, 9],
    cameraLookAt: [-2, 1.7, 1],
    onEnter: () => {
      horatio.visible = true;
      chandelierLight.intensity = 2.0;
      throneLight.intensity = 1.4;
    }
  }
];

// Book waypoints — one per beat. Default to cameraLookAt lifted 0.4m.
// Default: lift the book 1.0m above the lookAt so it floats above waist-height
// geometry (parapets, tables, etc.). Use beat.bookPos for explicit overrides.
const BOOK_WAYPOINTS = BEATS.map(b => b.bookPos || [b.cameraLookAt[0], b.cameraLookAt[1] + 1.0, b.cameraLookAt[2]]);
guideBook.placeAt(BOOK_WAYPOINTS[0]);

await BeatEngine.init({
  camera,
  onBeat: (beat, i, total) => {
    BookUI.showBeat(beat, i, total);
    guideBook.moveTo(BOOK_WAYPOINTS[i]);
  },
  onEnd: () => BookUI.showEnding({
    eyebrow: 'End of Act 1 · Hamlet I.ii',
    finalLine: '"My father\'s spirit in arms! All is not well; / I doubt some foul play."',
    prompt: 'Trace the word <em>seems</em> through this scene. Where does it appear, who uses it, and what does Hamlet refuse to let it cover?',
    onRestart: () => BeatEngine.start(BEATS)
  })
});

await BookUI.showTitle({
  author: 'William Shakespeare',
  title: 'Hamlet',
  chapter: 'Act 1 · Scene 2',
  intro: 'The great hall of Elsinore. Candlelight and tapestries. The new king explains himself before anyone has asked.<br><br>Follow the book. Click what you want to examine. When you are ready, press <em>Space</em>.',
  startLabel: 'Enter the court'
});

BeatEngine.start(BEATS);

startRenderLoop({ scene, camera, renderer, composer, onFrame: (dt) => guideBook.update(dt) });

// Self-eval mode: append ?eval=1 to the URL to run checks and show a banner.
if (new URLSearchParams(location.search).has('eval')) {
  const report = runGuideBookEval(guideBook, BOOK_WAYPOINTS);
  window.__EVAL_RESULT = report;
  showEvalBanner(report);
}
</script>
</body>
</html>
